; PlatformIO Project Configuration File
;
; Please visit documentation https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    Resistive_Sensor

[env:nodemcu]
platform = esp8266
board = nodemcu
framework = arduino
monitor_speed = 115200
lib_deps =
    Resistive_Sensor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    Resistive_Sensor